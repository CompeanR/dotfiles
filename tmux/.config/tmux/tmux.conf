# Main tmux entrypoint.
#
# tmux 3.6 loads both ~/.tmux.conf and ~/.config/tmux/tmux.conf. The guard keeps
# this explicit entrypoint readable without applying the config twice.
if-shell -F '#{@dotfiles_tmux_loaded}' {
  display-message -p ''
} {
  set -g @dotfiles_tmux_loaded 1

  source-file ~/.config/tmux/base.conf
  source-file ~/.config/tmux/themes/omarchy-bottom.conf

  if-shell 'test "$(uname)" = "Darwin"' 'source-file ~/.config/tmux/os/macos.conf'
  if-shell 'test "$(uname)" = "Linux"' 'source-file ~/.config/tmux/os/linux.conf'
}

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Resolve scripts directory once
run-shell 'tmux set -g @scripts_dir "$(dirname "$(readlink -f "$HOME/.tmux.conf")")/scripts"'

set -g prefix C-c
unbind C-b
bind-key C-c send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"
bind H split-window -h -b -c "#{pane_current_path}"
unbind c
unbind x
unbind -n M-w
unbind -n M-c
unbind -n M-q
unbind -n M-1
unbind -n M-2
unbind -n M-3
unbind -n M-4
unbind -n M-0
bind-key -n M-w new-window
bind-key -n M-q kill-pane
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf \; display-message "Configs Reloaded"

bind -r j resize-pane -D 10
bind -r k resize-pane -U 10
bind -r l resize-pane -R 10
bind -r h resize-pane -L 10
# Half page
bind -r J resize-pane -D 60
bind -r K resize-pane -U 60
bind -r L resize-pane -R 60
bind -r H resize-pane -L 60

# bind -r m resize-pane -Z
bind e select-layout even-horizontal
bind-key -n C-z resize-pane -Z
unbind z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'wl-copy'

unbind -T copy-mode-vi MouseDragEnd1Pane

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes


set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Exclude popup sessions from being saved by tmux-resurrect
run-shell 'tmux set -g @resurrect-hook-pre-save-all "#{@scripts_dir}/codex_cleanup_auto.sh"'


#--------------------------------------------------------------------------
# Status line
#--------------------------------------------------------------------------

# Status line customisation
set-option -g status-left-length 100
set-option -g status-left " #{session_name}  "
set-option -g status-right " "

#--------------------------------------------------------------------------
# Hidden Panes Logic (Using manage_hidden_panes.sh script)
#--------------------------------------------------------------------------

# Hide current pane (Prefix + o)
# Passes current pane_id, pane_title, and pane_current_path to the script
# Runs in foreground for debugging (removed -b)
bind-key C-m run-shell '"#{@scripts_dir}/manage_hidden_panes.sh" hide "#{pane_id}" "#{pane_title}" "#{pane_current_path}"'

# List and restore hidden panes (Prefix + O)
bind-key O display-menu -T "Hidden Panes" \
  "Restore Last Pane" L 'run-shell "\"#{@scripts_dir}/manage_hidden_panes.sh\" restore_last"' \
  "List Panes"        A 'run-shell "\"#{@scripts_dir}/manage_hidden_panes.sh\" list"' \
  "-----------------" - "" \
  "Clear All Hidden"  C 'run-shell "\"#{@scripts_dir}/manage_hidden_panes.sh\" clear"' \
  "Jump to Hidden Win" J 'run-shell "\"#{@scripts_dir}/manage_hidden_panes.sh\" jump"'

# Restore specific pane by ID (Prefix + R)
bind-key R command-prompt -p "Restore pane #:" \
  'run-shell "\"#{@scripts_dir}/manage_hidden_panes.sh\" restore_id %1"'

# Jump to hidden window (Prefix + M) - Alternative access
bind-key M run-shell '"#{@scripts_dir}/manage_hidden_panes.sh" jump'

#--------------------------------------------------------------------------
# Environment and Codex Popup
#--------------------------------------------------------------------------

# # Ensure tmux inherits the full environment for MCP servers

# Persistent Codex toggle (Alt+o) - keeps session alive
unbind -n M-o
bind-key -n M-o run-shell '"#{@scripts_dir}/codex_toggle.sh" "#{pane_current_path}"'
bind-key -n M-p run-shell '"#{@scripts_dir}/opencode_toggle.sh" "#{pane_current_path}"'
bind-key C-d run-shell '"#{@scripts_dir}/lazydocker_toggle.sh" "#{pane_current_path}"'
bind-key C-p run-shell '"#{@scripts_dir}/terminal_toggle.sh" "#{pane_current_path}"'

# Keep popup visibility tied to the active client/session/window
set-hook -g session-window-changed "run-shell -b \"'#{@scripts_dir}/popup_sync.sh' '#{socket_path}' '#{hook_client}' '#{client_tty}' '#{session_id}' '#{window_id}' '#{@scripts_dir}'\""
set-hook -g client-session-changed "run-shell -b \"'#{@scripts_dir}/popup_sync.sh' '#{socket_path}' '#{hook_client}' '#{client_tty}' '#{session_id}' '#{window_id}' '#{@scripts_dir}'\""
set-hook -g client-attached        "run-shell -b \"'#{@scripts_dir}/popup_sync.sh' '#{socket_path}' '#{hook_client}' '#{client_tty}' '#{session_id}' '#{window_id}' '#{@scripts_dir}'\""

# Native PageUp/PageDown scrolling for Codex panes (no prefix)
bind-key -n PPage if-shell 'ps -o args= -t "#{pane_tty}" | grep -qiE "(^|/| )codex( |$)|@openai/codex"' \
  'if-shell -F "#{pane_in_mode}" "send-keys -X halfpage-up" "copy-mode -e \; send-keys -X halfpage-up"' \
  'send-keys PPage'
bind-key -n NPage if-shell 'ps -o args= -t "#{pane_tty}" | grep -qiE "(^|/| )codex( |$)|@openai/codex"' \
  'if-shell -F "#{pane_in_mode}" "send-keys -X halfpage-down" "copy-mode -e \; send-keys -X halfpage-down"' \
  'send-keys NPage'

# Execute after tmux-resurrect (polls for completion before running cleanup)
run-shell 'tmux set -g @resurrect-hook-post-restore-all "tmux run-shell -b \"#{@scripts_dir}/wait_for_restore_complete.sh\""'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Leave bare Ctrl-j to the terminal; use prefix + Ctrl-j for tmux pane down
unbind -n C-j
unbind -T copy-mode-vi C-j

bind-key C-j if-shell -F "#{pane_at_bottom}" "" "select-pane -D"

# Alt+[ / Alt+] switch tmux windows globally
unbind -n M-[
unbind -n M-]
bind-key -n M-[ previous-window
bind-key -n M-] next-window

unbind -n 'M-{'
unbind -n 'M-}'
bind-key -n 'M-{' switch-client -p
bind-key -n 'M-}' switch-client -n

#--------------------------------------------------------------------------
# Don't exit copy mode ma booooy
#----------------------------------------------------------setw -g mode-keys vi
bind-key -T copy-mode-vi y send -X copy-pipe "wl-copy"
